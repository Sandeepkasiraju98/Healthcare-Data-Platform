version: '3.8'

services:

  # Flask API
  app:
    build: .
    container_name: healthcare_api
    ports:
      - "5000:5000"
    volumes:
      - .:/app
    depends_on:
      - mongo
    environment:
      - MONGO_URI=mongodb://mongo:27017/
    restart: always

  # MongoDB
  mongo:
    image: mongo:6.0
    container_name: healthcare_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: always

  # Mongo Express (MongoDB UI in browser)
  mongo-express:
    image: mongo-express
    container_name: healthcare_mongo_ui
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_SERVER=mongo
    depends_on:
      - mongo
    restart: always

volumes:
  mongo_data:
